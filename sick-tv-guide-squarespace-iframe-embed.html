function stvSwitchTab(name,btn){document.querySelectorAll(&#x27;.guide-tab&#x27;).forEach(el=&gt;el.classList.remove(&#x27;active&#x27;));document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach(el=&gt;el.classList.remove(&#x27;active&#x27;));document.getElementById(&#x27;stvTab&#x27;+name.charAt(0).toUpperCase()+name.slice(1)).classList.add(&#x27;active&#x27;);btn.classList.add(&#x27;active&#x27;);}
function stvRenderGuide(){
  const rows = CHANNELS.map(ch =&gt; `
    &lt;div class=&quot;gr&quot; id=&quot;stvChannel-${ch.number}&quot;&gt;
      &lt;div class=&quot;cc&quot;&gt;&lt;div class=&quot;cn&quot;&gt;${ch.number}&lt;/div&gt;&lt;div class=&quot;cl&quot;&gt;${stvEsc(ch.name)}&lt;/div&gt;&lt;/div&gt;
      ${ch.slots.slice(0,4).map((s,i)=&gt;`&lt;button type=&quot;button&quot; class=&quot;sc ${s.className}&quot; onclick=&quot;stvLoadVideoById(&#x27;${s.video_id}&#x27;)&quot;&gt;&lt;div class=&quot;st&quot;&gt;${stvEsc(s.title)}&lt;/div&gt;&lt;div class=&quot;sm&quot;&gt;${stvEsc(s.slot_label)} · &lt;span&gt;${stvEsc(s.playlist)}&lt;/span&gt;&lt;/div&gt;&lt;span class=&quot;badge ${i===0?&#x27;bl&#x27;:i===1?&#x27;bf&#x27;:&#x27;bs&#x27;}&quot;&gt;${stvEsc(i===0?&#x27;LIVE&#x27;:i===1?&#x27;FEATURE&#x27;:s.release_date)}&lt;/span&gt;&lt;/button&gt;`).join(&#x27;&#x27;)}
    &lt;/div&gt;`).join(&#x27;&#x27;);
  const track = document.getElementById(&#x27;stvGuideTrack&#x27;);
  track.innerHTML = rows + rows;
  requestAnimationFrame(()=&gt;{
    const wrap=document.getElementById(&#x27;stvGuideRows&#x27;);
    currentGuideMax = track.scrollHeight / 2;
    currentGuideOffset = 0;
    track.style.transform = &#x27;translateY(0px)&#x27;;
  });
}
function stvGuideScrollLoop(){
  const guideTab = document.getElementById(&#x27;stvTabGuide&#x27;);
  if(!guideTab.classList.contains(&#x27;active&#x27;)){ requestAnimationFrame(stvGuideScrollLoop); return; }
  currentGuideOffset += 0.28;
  if(currentGuideOffset &gt;= currentGuideMax) currentGuideOffset = 0;
  document.getElementById(&#x27;stvGuideTrack&#x27;).style.transform = `translateY(-${currentGuideOffset}px)`;
  requestAnimationFrame(stvGuideScrollLoop);
}
function stvRenderLatest(){document.getElementById(&#x27;stvLatestGrid&#x27;).innerHTML = LATEST.map(v=&gt;`&lt;button type=&quot;button&quot; class=&quot;vc&quot; onclick=&quot;stvLoadVideoById(&#x27;${v.video_id}&#x27;)&quot;&gt;&lt;div class=&quot;vt&quot;&gt;&lt;img src=&quot;${stvThumb(v.video_id)}&quot;&gt;&lt;/div&gt;&lt;div class=&quot;vtitle&quot;&gt;${stvEsc(v.title)}&lt;/div&gt;&lt;div class=&quot;vmeta&quot;&gt;${stvEsc(v.playlist)} · ${stvEsc(v.release_date)}&lt;/div&gt;&lt;/button&gt;`).join(&#x27;&#x27;);}
function stvFilterVideos(){const q=document.getElementById(&#x27;stvSearchInput&#x27;).value.trim().toLowerCase();const vids=!q?ALL_VIDEOS:ALL_VIDEOS.filter(v=&gt;[v.title,v.playlist,v.release_date].join(&#x27; &#x27;).toLowerCase().includes(q));document.getElementById(&#x27;stvResultCount&#x27;).textContent=`${vids.length} VIDEOS`;document.getElementById(&#x27;stvAllGrid&#x27;).innerHTML=vids.slice(0,180).map(v=&gt;`&lt;button type=&quot;button&quot; class=&quot;vc&quot; onclick=&quot;stvLoadVideoById(&#x27;${v.video_id}&#x27;)&quot;&gt;&lt;div class=&quot;vt&quot;&gt;&lt;img src=&quot;${stvThumb(v.video_id)}&quot;&gt;&lt;/div&gt;&lt;div class=&quot;vtitle&quot;&gt;${stvEsc(v.title)}&lt;/div&gt;&lt;div class=&quot;vmeta&quot;&gt;${stvEsc(v.playlist)} · ${stvEsc(v.release_date)}&lt;/div&gt;&lt;/button&gt;`).join(&#x27;&#x27;);}
function stvRenderUpNext(){const list=stvFlatRotationList();const upcoming=[];for(let i=1;i&lt;=6;i++)upcoming.push(list[(rotationIndex+i)%list.length]);document.getElementById(&#x27;stvUpNext&#x27;).innerHTML=upcoming.slice(0,5).map((v,i)=&gt;`&lt;button type=&quot;button&quot; class=&quot;ui&quot; onclick=&quot;stvLoadVideoById(&#x27;${v.video_id}&#x27;)&quot;&gt;&lt;div class=&quot;un&quot;&gt;${i+1}&lt;/div&gt;&lt;div&gt;&lt;div class=&quot;utitle&quot;&gt;${stvEsc(v.title)}&lt;/div&gt;&lt;div class=&quot;umeta&quot;&gt;CH ${v.channel_number} · ${stvEsc(v.playlist)}&lt;/div&gt;&lt;/div&gt;&lt;/button&gt;`).join(&#x27;&#x27;);document.getElementById(&#x27;stvNextStrip&#x27;).innerHTML=upcoming.map(v=&gt;`&lt;button type=&quot;button&quot; class=&quot;ncard&quot; onclick=&quot;stvLoadVideoById(&#x27;${v.video_id}&#x27;)&quot;&gt;&lt;div class=&quot;ncard-thumb&quot;&gt;&lt;img src=&quot;${stvThumb(v.video_id)}&quot;&gt;&lt;/div&gt;&lt;div class=&quot;ncard-title&quot;&gt;${stvEsc(v.title)}&lt;/div&gt;&lt;/button&gt;`).join(&#x27;&#x27;);}
function stvUpdatePreview(){const list=stvFlatRotationList();const v=list[rotationIndex%list.length];if(!v)return;currentChannel=v.channel_number;document.getElementById(&#x27;stvPreviewFrame&#x27;).src=stvEmbed(v.video_id);document.getElementById(&#x27;stvPrevTitle&#x27;).textContent=v.title;document.getElementById(&#x27;stvPrevMeta&#x27;).innerHTML=`SICK TV &amp;nbsp;&amp;#183;&amp;nbsp; CH ${v.channel_number} &amp;nbsp;&amp;#183;&amp;nbsp; ${v.playlist} &amp;nbsp;&amp;#183;&amp;nbsp; ${v.release_date}`;document.getElementById(&#x27;stvWatchNowBtn&#x27;).href=v.url;document.getElementById(&#x27;stvStatsNow&#x27;).textContent=v.playlist;document.getElementById(&#x27;stvRotCount&#x27;).textContent=&#x27;#&#x27;+(rotationIndex+1);stvHighlightChannel();stvRenderUpNext();}
function stvUpdateTimer(){if(playbackLocked){document.getElementById(&#x27;stvPrevTimer&#x27;).innerHTML=&#x27;&amp;#9654; PLAYING HERE &amp;middot; AUTO-ROTATE OFF&#x27;;document.getElementById(&#x27;stvProgElapsed&#x27;).textContent=&#x27;LIVE&#x27;;document.getElementById(&#x27;stvProgTotal&#x27;).textContent=&#x27;HOLD&#x27;;document.getElementById(&#x27;stvProgFill&#x27;).style.width=&#x27;100%&#x27;;return;}countdown--;if(countdown&lt;=0){rotationIndex=(rotationIndex+1)%stvFlatRotationList().length;countdown=rotationSeconds;stvUpdatePreview();}const remain=String(countdown).padStart(2,&#x27;0&#x27;);document.getElementById(&#x27;stvPrevTimer&#x27;).innerHTML=`&amp;#9646;&amp;#9646; 00:${remain} REMAINING`;document.getElementById(&#x27;stvProgElapsed&#x27;).textContent=`0:${String(rotationSeconds-countdown).padStart(2,&#x27;0&#x27;)}`;document.getElementById(&#x27;stvProgTotal&#x27;).textContent=`0:${String(rotationSeconds).padStart(2,&#x27;0&#x27;)}`;document.getElementById(&#x27;stvProgFill&#x27;).style.width=`${((rotationSeconds-countdown)/rotationSeconds)*100}%`;}
function stvLoadRandom(){const list=stvFlatRotationList();playbackLocked=false;rotationIndex=Math.floor(Math.random()*list.length);countdown=rotationSeconds;stvUpdatePreview();}
function stvLoadVideoById(id){const list=stvFlatRotationList();const idx=list.findIndex(v=&gt;v.video_id===id);if(idx&gt;=0){playbackLocked=false;rotationIndex=idx;countdown=rotationSeconds;stvUpdatePreview();}}
function stvPlayerCommand(func){const frame=document.getElementById('stvPreviewFrame');if(frame&&frame.contentWindow){frame.contentWindow.postMessage(JSON.stringify({event:'command',func,args:[]}),'*');}}
function stvRefreshPlayerAudio(){stvPlayerCommand(playerMuted?'mute':'unMute');} 
function stvKeepPlayingHere(){playbackLocked=true;countdown=rotationSeconds;stvUpdatePreview();stvPlayerCommand('playVideo');}
function stvToggleMute(){playerMuted=!playerMuted;stvRefreshPlayerAudio();const unmuteBtn=document.getElementById('stvUnmuteBtn');if(unmuteBtn)unmuteBtn.textContent=playerMuted?'UNMUTE':'MUTED OFF';}
function stvToggleMute(){playerMuted=false;stvUpdatePreview();}
function stvJumpToCurrentChannel(){const target=document.getElementById(`stvChannel-${currentChannel}`);if(target){const rect=target.getBoundingClientRect();const wrap=document.getElementById(&#x27;stvGuideRows&#x27;);const wrapRect=wrap.getBoundingClientRect();const absoluteTop = rect.top - wrapRect.top + currentGuideOffset; currentGuideOffset = Math.max(0, absoluteTop - 120); if(currentGuideOffset &gt;= currentGuideMax) currentGuideOffset = currentGuideOffset % currentGuideMax; document.getElementById(&#x27;stvGuideTrack&#x27;).style.transform = `translateY(-${currentGuideOffset}px)`;}}
function stvHighlightChannel(){document.querySelectorAll(&#x27;.gr&#x27;).forEach(el=&gt;el.style.boxShadow=&#x27;none&#x27;);const row=document.getElementById(`stvChannel-${currentChannel}`);if(row)row.style.boxShadow=&#x27;inset 0 0 0 1px var(--or)&#x27;;}
window.stvLoadVideoById = stvLoadVideoById;
window.stvLoadRandom = stvLoadRandom;
window.stvJumpToCurrentChannel = stvJumpToCurrentChannel;
window.stvSwitchTab = stvSwitchTab;
stvRenderGuide();stvRenderLatest();stvFilterVideos();stvClockTick();stvUpdatePreview();requestAnimationFrame(stvGuideScrollLoop);setInterval(stvClockTick,1000);setInterval(stvUpdateTimer,1000);
})();
